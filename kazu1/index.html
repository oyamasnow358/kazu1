<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>MieeL｜かずをまなぼう（すうじトレーニング）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FFFBF2;
  --ink:#2D5A4A;
  --ink-soft:#4A7A68;
  --orange:#F2994A;
  --orange-soft:#FCE0C2;
  --teal:#4A90A4;
  --teal-soft:#DCEEF2;
  --pink:#E8889C;
  --pink-soft:#FBE2E8;
  --card:#FFFFFF;
  --line:#E7DFCE;
  --radius:28px;
  --radius-sm:16px;
  --focus:#1F6FEB;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Zen Maru Gothic', sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
button{font-family:inherit;}
button:focus-visible, .choice:focus-visible, .opt-btn:focus-visible{
  outline:4px solid var(--focus);
  outline-offset:3px;
}

/* ===== layout ===== */
.app{max-width:1100px;margin:0 auto;padding:18px 18px 60px;}
header.top{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;flex-wrap:wrap;margin-bottom:18px;
}
.brand{display:flex;align-items:center;gap:14px;}
.brand .mark{
  width:50px;height:50px;border-radius:50%;
  background:radial-gradient(circle at 50% 0%, #1B8FE8 0%, #2BB8D6 28%, #3FCB9E 45%, #8FD24A 58%, #F4D027 72%, #F7941E 100%);
  flex:none;
}
.brand h1{font-size:1.5rem;margin:0;line-height:1.2;color:#111;font-weight:900;letter-spacing:.01em;}
.brand p{margin:2px 0 0;font-size:.8rem;color:var(--ink-soft);}
.brand-text{display:flex;flex-direction:column;}
.brand-link{font-size:.72rem;color:var(--teal);text-decoration:none;}
.brand-link:hover{text-decoration:underline;}

.printbtn{
  background:var(--ink);color:#fff;border:none;border-radius:999px;
  padding:14px 22px;font-size:1rem;font-weight:700;cursor:pointer;
  box-shadow:0 5px 0 #1c3c31;display:flex;align-items:center;gap:8px;
}
.printbtn:active{transform:translateY(3px);box-shadow:0 2px 0 #1c3c31;}

/* ===== control panel ===== */
.panel{
  background:var(--card);border-radius:var(--radius);
  padding:18px 20px;margin-bottom:20px;border:2px solid var(--line);
}
.panel-row{display:flex;flex-wrap:wrap;gap:22px;align-items:flex-start;}
.control-group{flex:1;min-width:260px;}
.control-group h2{
  font-size:.85rem;letter-spacing:.05em;color:var(--ink-soft);
  margin:0 0 10px;font-weight:700;
}
.seg{display:flex;gap:8px;flex-wrap:wrap;}
.seg button{
  border:2px solid var(--line);background:#fff;color:var(--ink);
  border-radius:14px;padding:10px 16px;font-size:1rem;font-weight:700;
  cursor:pointer;transition:.15s;
}
.seg button[aria-pressed="true"]{
  background:var(--orange);border-color:var(--orange);color:#fff;
  box-shadow:0 4px 0 #d97f2c;
}
.seg button:not([aria-pressed="true"]):hover{background:var(--orange-soft);}

/* ===== stage ===== */
.stage{
  background:var(--card);border-radius:var(--radius);
  border:2px solid var(--line);
  padding:30px 24px;min-height:420px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  position:relative;
}
.prompt{font-size:1.4rem;font-weight:700;margin:0 0 22px;text-align:center;}
.prompt .num-em{color:var(--orange);font-size:1.7rem;}

.objects-tray{
  display:flex;flex-wrap:wrap;gap:14px;justify-content:center;
  max-width:640px;margin-bottom:28px;min-height:80px;
}
.obj{
  font-size:3rem;line-height:1;
  filter:drop-shadow(0 4px 0 rgba(0,0,0,.08));
  animation:pop .25s ease both;
}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}

.choices{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:760px;}
.choice{
  background:var(--teal-soft);border:3px solid var(--teal);color:var(--ink);
  font-size:2.1rem;font-weight:900;border-radius:20px;
  width:84px;height:84px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 5px 0 #3a7383;transition:.1s;
}
.choice:active{transform:translateY(4px);box-shadow:0 1px 0 #3a7383;}
.choice.correct-flash{background:#cdeccb;border-color:#5a9e54;box-shadow:0 5px 0 #4c8447;}
.choice.wrong-flash{background:var(--pink-soft);border-color:var(--pink);}

.group-options{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.opt-btn{
  background:#fff;border:3px solid var(--line);border-radius:20px;
  padding:14px 18px;cursor:pointer;display:flex;flex-wrap:wrap;gap:6px;
  max-width:190px;justify-content:center;align-items:center;min-height:110px;
  box-shadow:0 4px 0 var(--line);
}
.opt-btn span{font-size:2rem;}
.opt-btn.correct-flash{border-color:#5a9e54;background:#eafbe8;}
.opt-btn.wrong-flash{border-color:var(--pink);background:var(--pink-soft);}

/* feedback */
.feedback{
  margin-top:22px;font-size:1.3rem;font-weight:700;min-height:40px;
  display:flex;align-items:center;gap:10px;
}
.feedback.ok{color:#3c7a35;}
.feedback.retry{color:var(--orange);}
.feedback .icon{font-size:1.6rem;}

.stagefoot{display:flex;gap:14px;margin-top:26px;align-items:center;flex-wrap:wrap;justify-content:center;}
.next-btn{
  background:var(--orange);color:#fff;border:none;border-radius:16px;
  padding:14px 26px;font-size:1.1rem;font-weight:700;cursor:pointer;
  box-shadow:0 5px 0 #d97f2c;
}
.next-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #d97f2c;}
.score-pill{
  background:var(--pink-soft);border:2px solid var(--pink);color:#a14a63;
  border-radius:999px;padding:10px 18px;font-weight:700;font-size:1rem;
}

/* ===== writing/trace mode ===== */
.trace-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
canvas#traceCanvas{
  touch-action:none;border-radius:20px;border:3px dashed var(--teal);
  background:#fff;
}
.trace-tools{display:flex;gap:12px;}
.tool-btn{
  background:#fff;border:2px solid var(--line);border-radius:12px;
  padding:10px 16px;font-weight:700;cursor:pointer;
}

/* ===== print sheet (hidden on screen) ===== */
#printArea{display:none;}

@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{
    display:block;position:absolute;top:0;left:0;width:100%;
    font-family:'Zen Maru Gothic', sans-serif;color:#000;
  }
  .ps-page{page-break-after:always;padding:14mm;}
  .ps-page:last-child{page-break-after:auto;}
}

footer.note{
  text-align:center;color:var(--ink-soft);font-size:.8rem;margin-top:30px;
}

@media (max-width:560px){
  .brand h1{font-size:1.2rem;}
  .choice{width:70px;height:70px;font-size:1.7rem;}
  .obj{font-size:2.3rem;}
}

/* reduced motion */
@media (prefers-reduced-motion: reduce){
  .obj{animation:none;}
  .choice, .next-btn, .printbtn{transition:none;}
}
</style>
</head>
<body>

<div class="app">
  <header class="top">
    <div class="brand">
      <div class="mark" aria-hidden="true"></div>
      <div class="brand-text">
        <h1>MieeL かずをまなぼう</h1>
        <p>すうじトレーニング・難易度をえらべます</p>
        <a class="brand-link" href="https://www.mieel-support-school.com/" target="_blank" rel="noopener">www.mieel-support-school.com</a>
      </div>
    </div>
    <button class="printbtn" id="printOpen" type="button">🖨️ プリント問題をつくる</button>
  </header>

  <section class="panel" aria-label="設定">
    <div class="panel-row">
      <div class="control-group">
        <h2>なんのれんしゅう？（モード）</h2>
        <div class="seg" id="modeSeg" role="group" aria-label="モードをえらぶ">
          <button data-mode="count" aria-pressed="true">かぞえる</button>
          <button data-mode="match" aria-pressed="false">みつける</button>
          <button data-mode="write" aria-pressed="false">かく</button>
          <button data-mode="add" aria-pressed="false">たしざん</button>
        </div>
      </div>
      <div class="control-group">
        <h2>むずかしさ</h2>
        <div class="seg" id="diffSeg" role="group" aria-label="難易度をえらぶ">
          <button data-diff="easy" aria-pressed="true">かんたん（1〜5）</button>
          <button data-diff="normal" aria-pressed="false">ふつう（1〜10）</button>
          <button data-diff="hard" aria-pressed="false">むずかしい（1〜20）</button>
        </div>
      </div>
    </div>
  </section>

  <main class="stage" id="stage" aria-live="polite">
    <!-- JS が内容を描画 -->
  </main>

  <footer class="note">
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px;">
      <div style="width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 50% 0%, #1B8FE8 0%, #2BB8D6 28%, #3FCB9E 45%, #8FD24A 58%, #F4D027 72%, #F7941E 100%);"></div>
      <strong style="color:#111;">MieeL</strong>
      <a href="https://www.mieel-support-school.com/" target="_blank" rel="noopener" style="color:var(--teal);">mieel-support-school.com</a>
    </div>
    保護者・指導者の方へ：右上の「プリント問題をつくる」から、現在の設定にあわせたワークシート（PDF）を作成できます。
  </footer>
</div>

<!-- ============ 印刷用ワークシート ============ -->
<div id="printArea"></div>

<script>
(function(){
  "use strict";

  /* ---------- 状態管理 ---------- */
  const state = {
    mode: "count",
    diff: "easy",
    score: 0,
    total: 0,
    current: null
  };

  const DIFF_CONF = {
    easy:   { min:1, max:5,  choices:3, addMax:5  },
    normal: { min:1, max:10, choices:4, addMax:5  },
    hard:   { min:1, max:20, choices:5, addMax:10 }
  };

  const ICON_SETS = ["🍎","⭐","🐱","🎈","🍓","🐟","🌼","🚗"];

  function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function pick(arr){ return arr[rand(0,arr.length-1)]; }
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = rand(0,i);
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  /* ---------- DOM参照 ---------- */
  const stage = document.getElementById("stage");
  const modeSeg = document.getElementById("modeSeg");
  const diffSeg = document.getElementById("diffSeg");

  modeSeg.addEventListener("click", e=>{
    const btn = e.target.closest("button[data-mode]");
    if(!btn) return;
    [...modeSeg.children].forEach(b=>b.setAttribute("aria-pressed", b===btn));
    state.mode = btn.dataset.mode;
    newQuestion();
  });
  diffSeg.addEventListener("click", e=>{
    const btn = e.target.closest("button[data-diff]");
    if(!btn) return;
    [...diffSeg.children].forEach(b=>b.setAttribute("aria-pressed", b===btn));
    state.diff = btn.dataset.diff;
    newQuestion();
  });

  /* ---------- 問題生成 ---------- */
  function genCountQuestion(){
    const c = DIFF_CONF[state.diff];
    const answer = rand(c.min, c.max);
    const icon = pick(ICON_SETS);
    let opts = new Set([answer]);
    while(opts.size < c.choices){
      let v = rand(Math.max(1,answer-3), Math.min(c.max+2, answer+3));
      if(v>=1) opts.add(v);
    }
    return { type:"count", answer, icon, options: shuffle([...opts]) };
  }

  function genMatchQuestion(){
    // 数字を見せて、対応する個数のオブジェクト群を選ばせる
    const c = DIFF_CONF[state.diff];
    const answer = rand(c.min, c.max);
    const icon = pick(ICON_SETS);
    const numGroups = Math.min(c.choices, 4);
    let counts = new Set([answer]);
    while(counts.size < numGroups){
      let v = rand(Math.max(1,answer-3), Math.min(c.max+2, answer+3));
      if(v>=1) counts.add(v);
    }
    return { type:"match", answer, icon, groups: shuffle([...counts]) };
  }

  function genAddQuestion(){
    const c = DIFF_CONF[state.diff];
    const max = c.addMax;
    const a = rand(1, max-1);
    const b = rand(1, max-a);
    const answer = a+b;
    const icon = pick(ICON_SETS);
    const icon2 = pick(ICON_SETS.filter(i=>i!==icon)) || icon;
    let opts = new Set([answer]);
    while(opts.size < c.choices){
      let v = rand(Math.max(1,answer-3), answer+3);
      if(v>=1) opts.add(v);
    }
    return { type:"add", a, b, answer, icon, icon2, options: shuffle([...opts]) };
  }

  function genWriteQuestion(){
    const c = DIFF_CONF[state.diff];
    const answer = rand(c.min, c.max);
    return { type:"write", answer };
  }

  function newQuestion(){
    if(state.mode==="count") state.current = genCountQuestion();
    else if(state.mode==="match") state.current = genMatchQuestion();
    else if(state.mode==="add") state.current = genAddQuestion();
    else if(state.mode==="write") state.current = genWriteQuestion();
    render();
  }

  /* ---------- 描画 ---------- */
  function render(){
    stage.innerHTML = "";
    const q = state.current;

    const scorePill = ()=>{
      const p = document.createElement("div");
      p.className = "score-pill";
      p.textContent = `せいかい ${state.score} / ${state.total}`;
      return p;
    };

    if(q.type==="count"){
      const prompt = document.createElement("p");
      prompt.className = "prompt";
      prompt.textContent = "いくつ あるかな？";
      stage.appendChild(prompt);

      const tray = document.createElement("div");
      tray.className = "objects-tray";
      for(let i=0;i<q.answer;i++){
        const s = document.createElement("span");
        s.className = "obj";
        s.style.animationDelay = (i*0.04)+"s";
        s.textContent = q.icon;
        tray.appendChild(s);
      }
      stage.appendChild(tray);

      const choices = document.createElement("div");
      choices.className = "choices";
      q.options.forEach(v=>{
        const b = document.createElement("button");
        b.className = "choice";
        b.textContent = v;
        b.addEventListener("click", ()=>answer(v===q.answer, b));
        choices.appendChild(b);
      });
      stage.appendChild(choices);

    } else if(q.type==="match"){
      const prompt = document.createElement("p");
      prompt.className = "prompt";
      prompt.innerHTML = `<span class="num-em">${q.answer}</span> と おなじ かずを えらぼう`;
      stage.appendChild(prompt);

      const wrap = document.createElement("div");
      wrap.className = "group-options";
      q.groups.forEach(g=>{
        const b = document.createElement("button");
        b.className = "opt-btn";
        for(let i=0;i<g;i++){
          const s = document.createElement("span");
          s.textContent = q.icon;
          b.appendChild(s);
        }
        b.addEventListener("click", ()=>answer(g===q.answer, b));
        wrap.appendChild(b);
      });
      stage.appendChild(wrap);

    } else if(q.type==="add"){
      const prompt = document.createElement("p");
      prompt.className = "prompt";
      prompt.textContent = "あわせて いくつ？";
      stage.appendChild(prompt);

      const tray = document.createElement("div");
      tray.className = "objects-tray";
      for(let i=0;i<q.a;i++){
        const s = document.createElement("span"); s.className="obj"; s.textContent=q.icon; tray.appendChild(s);
      }
      const plus = document.createElement("span");
      plus.style.fontSize = "2.4rem"; plus.style.margin = "0 6px"; plus.style.alignSelf="center";
      plus.textContent = "＋";
      tray.appendChild(plus);
      for(let i=0;i<q.b;i++){
        const s = document.createElement("span"); s.className="obj"; s.textContent=q.icon2; tray.appendChild(s);
      }
      stage.appendChild(tray);

      const choices = document.createElement("div");
      choices.className = "choices";
      q.options.forEach(v=>{
        const b = document.createElement("button");
        b.className = "choice";
        b.textContent = v;
        b.addEventListener("click", ()=>answer(v===q.answer, b));
        choices.appendChild(b);
      });
      stage.appendChild(choices);

    } else if(q.type==="write"){
      const prompt = document.createElement("p");
      prompt.className = "prompt";
      prompt.innerHTML = `<span class="num-em">${q.answer}</span> を なぞって みよう`;
      stage.appendChild(prompt);

      const wrap = document.createElement("div");
      wrap.className = "trace-wrap";
      const canvas = document.createElement("canvas");
      canvas.id = "traceCanvas";
      canvas.width = 320; canvas.height = 320;
      wrap.appendChild(canvas);

      const tools = document.createElement("div");
      tools.className = "trace-tools";
      const clearBtn = document.createElement("button");
      clearBtn.className = "tool-btn"; clearBtn.textContent = "🧹 けす";
      const doneBtn = document.createElement("button");
      doneBtn.className = "tool-btn"; doneBtn.textContent = "✅ できた！";
      tools.appendChild(clearBtn); tools.appendChild(doneBtn);
      wrap.appendChild(tools);
      stage.appendChild(wrap);

      setupTraceCanvas(canvas, q.answer);
      clearBtn.addEventListener("click", ()=>drawGuide(canvas, q.answer));
      doneBtn.addEventListener("click", ()=>{
        state.total++; state.score++;
        showFeedback(true);
      });
    }

    // フィードバック領域
    const fb = document.createElement("div");
    fb.className = "feedback";
    fb.id = "fb";
    stage.appendChild(fb);

    // フッター（つぎへ・スコア）
    const foot = document.createElement("div");
    foot.className = "stagefoot";
    const nb = document.createElement("button");
    nb.className = "next-btn"; nb.textContent = "つぎの もんだい";
    nb.addEventListener("click", newQuestion);
    foot.appendChild(nb);
    if(state.total>0) foot.appendChild(scorePill());
    stage.appendChild(foot);
  }

  function answer(isCorrect, el){
    state.total++;
    if(isCorrect) state.score++;
    el.classList.add(isCorrect? "correct-flash":"wrong-flash");
    setTimeout(()=>el.classList.remove(isCorrect? "correct-flash":"wrong-flash"), 700);
    showFeedback(isCorrect);
  }

  function showFeedback(isCorrect){
    const fb = document.getElementById("fb");
    if(!fb) return;
    if(isCorrect){
      fb.className = "feedback ok";
      fb.innerHTML = `<span class="icon">◎</span> せいかい！ よくできました`;
    } else {
      fb.className = "feedback retry";
      fb.innerHTML = `<span class="icon">△</span> もういちど かぞえてみよう`;
    }
  }

  /* ---------- なぞり書きキャンバス ---------- */
  function drawGuide(canvas, num){
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.font = "900 260px 'Zen Maru Gothic', sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#FCE0C2";
    ctx.fillText(String(num), canvas.width/2, canvas.height/2+15);
    // 点線風アウトライン
    ctx.strokeStyle = "#F2994A";
    ctx.lineWidth = 2;
    ctx.setLineDash([4,6]);
    ctx.strokeText(String(num), canvas.width/2, canvas.height/2+15);
    ctx.setLineDash([]);
  }

  function setupTraceCanvas(canvas, num){
    drawGuide(canvas, num);
    const ctx = canvas.getContext("2d");
    ctx.lineWidth = 10;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#4A90A4";
    let drawing = false;

    function pos(e){
      const r = canvas.getBoundingClientRect();
      const cx = (e.touches? e.touches[0].clientX : e.clientX) - r.left;
      const cy = (e.touches? e.touches[0].clientY : e.clientY) - r.top;
      return { x: cx*(canvas.width/r.width), y: cy*(canvas.height/r.height) };
    }
    function start(e){ drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
    function move(e){ if(!drawing) return; const p = pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); }
    function end(){ drawing = false; }

    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", move);
    window.addEventListener("mouseup", end);
    canvas.addEventListener("touchstart", start, {passive:false});
    canvas.addEventListener("touchmove", move, {passive:false});
    canvas.addEventListener("touchend", end);
  }

  /* ============ 印刷ワークシート生成 ============ */
  document.getElementById("printOpen").addEventListener("click", buildPrintSheet);

  function buildPrintSheet(){
    const c = DIFF_CONF[state.diff];
    const area = document.getElementById("printArea");
    area.innerHTML = "";

    const page1 = document.createElement("div");
    page1.className = "ps-page";
    page1.innerHTML = printHeader("かぞえて すうじを かこう");

    const grid1 = document.createElement("div");
    grid1.style.display = "grid";
    grid1.style.gridTemplateColumns = "1fr 1fr";
    grid1.style.gap = "10mm 8mm";
    grid1.style.marginTop = "8mm";

    const DOT_COLORS=["#E06030","#2878A0","#C04870","#3A7A40","#6040A0","#B07010","#C03030","#207870"];
    for(let i=0;i<6;i++){
      const n = rand(c.min, c.max);
      const col = DOT_COLORS[i % DOT_COLORS.length];
      // Unicode ● を使う（CSSスパンは印刷で消えるため）
      const cell = document.createElement("div");
      cell.style.border = "2px solid #ddd";
      cell.style.borderRadius = "10px";
      cell.style.padding = "5mm 6mm";
      cell.innerHTML = `
        <div style="min-height:20mm;line-height:1.8;font-size:22px;color:${col};letter-spacing:3px;word-break:break-all;">
          ${"● ".repeat(n).trim()}
        </div>
        <div style="margin-top:4mm;font-size:14px;">こたえ：
          <span style="display:inline-block;width:18mm;height:14mm;border:2px dashed #999;border-radius:6px;vertical-align:middle;"></span>
        </div>`;
      grid1.appendChild(cell);
    }
    page1.appendChild(grid1);
    area.appendChild(page1);

    // ページ2：なぞり書き
    const page2 = document.createElement("div");
    page2.className = "ps-page";
    page2.innerHTML = printHeader("すうじを なぞろう");
    const traceWrap = document.createElement("div");
    traceWrap.style.display = "grid";
    traceWrap.style.gridTemplateColumns = "repeat(4, 1fr)";
    traceWrap.style.gap = "6mm";
    traceWrap.style.marginTop = "8mm";

    const numsForTrace = [];
    const upper = Math.min(c.max, 20);
    for(let n=c.min; n<=upper; n++) numsForTrace.push(n);
    numsForTrace.forEach(n=>{
      const box = document.createElement("div");
      box.style.border = "2px solid #ddd";
      box.style.borderRadius = "10px";
      box.style.padding = "4mm";
      box.style.textAlign = "center";
      box.innerHTML = `
        <div style="font-size:54px;font-weight:900;color:#eee;-webkit-text-stroke:2px #F2994A;letter-spacing:0;line-height:1.1;">${n}</div>
        <div style="margin-top:3mm;display:flex;gap:2mm;justify-content:center;">
          ${Array(3).fill(`<div style="width:11mm;height:13mm;border:1.5px dashed #F2994A;border-radius:5px;background:#FFFAF5;"></div>`).join("")}
        </div>`;
      traceWrap.appendChild(box);
    });
    page2.appendChild(traceWrap);
    area.appendChild(page2);

    // ページ3：たしざん or マッチング（難易度がnormal/hardならたしざんも追加）
    if(state.mode==="add" || c.addMax){
      const page3 = document.createElement("div");
      page3.className = "ps-page";
      page3.innerHTML = printHeader("たしざんに ちょうせん！");
      const list = document.createElement("div");
      list.style.marginTop = "8mm";
      for(let i=0;i<6;i++){
        const max = c.addMax;
        const a = rand(1, Math.max(1,max-1));
        const b = rand(1, Math.max(1,max-a));
        const icon = pick(ICON_SETS);
        const row = document.createElement("div");
        row.style.display = "flex";
        row.style.alignItems = "center";
        row.style.gap = "6px";
        row.style.fontSize = "24px";
        row.style.marginBottom = "10mm";
        row.innerHTML = `
          <span style="font-size:20px;color:#C05020;letter-spacing:2px;">${"● ".repeat(a).trim()}</span>
          <span style="font-size:28px;margin:0 4px;">＋</span>
          <span style="font-size:20px;color:#1A6090;letter-spacing:2px;">${"● ".repeat(b).trim()}</span>
          <span style="font-size:28px;margin:0 4px;">＝</span>
          <span style="display:inline-block;width:20mm;height:16mm;border:2px dashed #999;border-radius:6px;vertical-align:middle;"></span>
        `;
        list.appendChild(row);
      }
      page3.appendChild(list);
      area.appendChild(page3);
    }

    // ページ4：かず合わせ（みつける）
    const page4 = document.createElement("div");
    page4.className = "ps-page";
    page4.innerHTML = printHeader("おなじ かずを せんで むすぼう");
    const matchGrid = document.createElement("div");
    matchGrid.style.display = "grid";
    matchGrid.style.gridTemplateColumns = "1fr 1fr";
    matchGrid.style.gap = "10mm";
    matchGrid.style.marginTop = "10mm";
    const left = document.createElement("div");
    const right = document.createElement("div");
    const nums = shuffle(Array.from({length:5}, ()=>rand(c.min,c.max)));
    const numsRight = shuffle(nums);
    const matchColors=["#C05020","#1A6090","#A02060","#207040","#502090"];
    nums.forEach((n,ni)=>{
      const col = matchColors[ni%matchColors.length];
      const row = document.createElement("div");
      row.style.marginBottom = "12mm";
      row.style.fontSize = "22px";
      row.style.color = col;
      row.style.letterSpacing = "4px";
      row.textContent = "● ".repeat(n).trim();
      left.appendChild(row);
    });
    numsRight.forEach(n=>{
      const row = document.createElement("div");
      row.style.fontSize = "30px";
      row.style.fontWeight = "900";
      row.style.marginBottom = "12mm";
      row.style.textAlign = "right";
      row.textContent = n;
      right.appendChild(row);
    });
    matchGrid.appendChild(left);
    matchGrid.appendChild(right);
    page4.appendChild(matchGrid);
    area.appendChild(page4);

    window.print();
  }

  function printHeader(title){
    const today = new Date();
    const dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
    return `
      <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #2D5A4A;padding-bottom:4mm;margin-bottom:2mm;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 50% 0%, #1B8FE8 0%, #2BB8D6 28%, #3FCB9E 45%, #8FD24A 58%, #F4D027 72%, #F7941E 100%);flex:none;"></div>
          <div>
            <div style="font-size:11px;color:#000;font-weight:700;">MieeL ｜ かずをまなぼう ワークシート（難易度：${diffLabel()}）</div>
            <h2 style="margin:2px 0 0;font-size:22px;color:#000;">${title}</h2>
          </div>
        </div>
        <div style="font-size:11px;color:#444;text-align:right;">
          ${dateStr}　なまえ：＿＿＿＿＿＿＿＿＿＿<br>
          <span style="color:#000;">mieel-support-school.com</span>
        </div>
      </div>`;
  }
  function diffLabel(){
    return state.diff==="easy"?"かんたん":state.diff==="normal"?"ふつう":"むずかしい";
  }

  /* ---------- 初期化 ---------- */
  newQuestion();
})();
</script>
</body>
</html>
